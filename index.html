<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SOXL · Kouya Method</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#080b10;--card:#131820;--b1:#1a2133;--b2:#22304a;
  --ac:#38bdf8;--gr:#34d399;--rd:#f87171;--yw:#fbbf24;--pu:#a78bfa;--or:#fb923c;
  --t1:#e2e8f0;--t2:#94a3b8;--t3:#64748b;
  --mono:'IBM Plex Mono',monospace;--sans:'Noto Sans KR',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 40% at 20% 0%,rgba(56,189,248,.05),transparent),
             radial-gradient(ellipse 50% 30% at 80% 100%,rgba(167,139,250,.04),transparent)}
.page{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:0 20px 80px}

header{padding:30px 0 18px;border-bottom:1px solid var(--b1);display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:0}
.chip{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--ac);background:rgba(56,189,248,.07);border:1px solid rgba(56,189,248,.2);padding:3px 9px;border-radius:2px;display:inline-block;margin-bottom:6px}
h1{font-size:clamp(15px,3vw,22px);font-weight:700;color:#fff}
h1 span{color:var(--ac)}
.live-badge{font-family:var(--mono);font-size:11px;color:var(--t3);display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--gr);box-shadow:0 0 6px var(--gr);animation:blink 2s ease infinite;flex-shrink:0}
.dot.stale{background:var(--yw);box-shadow:0 0 6px var(--yw)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* main tabs */
.main-tabs{display:flex;border-bottom:1px solid var(--b1);overflow-x:auto;position:sticky;top:0;z-index:30;background:var(--bg);padding-top:2px}
.mtab{font-size:12px;font-family:var(--mono);letter-spacing:.07em;padding:11px 16px;cursor:pointer;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .14s;white-space:nowrap}
.mtab.active{color:var(--ac);border-color:var(--ac)}
.mtab:hover:not(.active){color:var(--t2)}
.mpane{display:none;padding:22px 0}.mpane.active{display:block}

/* field - 정렬 수정 */
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;font-family:var(--mono);color:var(--t3);letter-spacing:.07em;line-height:1.4}
.field input,.field select{
  background:#0e1117;border:1px solid var(--b2);color:var(--t1);
  font-family:var(--mono);font-size:13px;padding:8px 10px;
  border-radius:4px;outline:none;transition:border-color .2s;width:100%;
  height:36px;  /* 고정 높이로 정렬 통일 */
}
.field input:focus,.field select:focus{border-color:var(--ac)}
.field input[type=number]{-moz-appearance:textfield}
.field input::-webkit-outer-spin-button,.field input::-webkit-inner-spin-button{-webkit-appearance:none}
.field .hint{font-size:10px;color:var(--t3);font-family:var(--mono);line-height:1.4}
.field select{cursor:pointer;appearance:auto}

/* grid - align-items:start 로 변경해 라벨 높이 달라도 위에서 정렬 */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px 12px;align-items:start}
.grid-end{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px 12px;align-items:end}
.drow{display:flex;align-items:center;gap:7px}
.drow span{color:var(--t3);font-family:var(--mono);font-size:11px;white-space:nowrap}
.drow .field{flex:1}

/* section */
.sec{background:var(--card);border:1px solid var(--b2);border-radius:10px;padding:20px 22px;margin-bottom:14px;position:relative;overflow:hidden}
.sec::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sec.blue::before{background:linear-gradient(90deg,var(--ac),transparent)}
.sec.purple::before{background:linear-gradient(90deg,var(--pu),var(--ac),transparent)}
.sec-title{font-family:var(--mono);font-size:10px;letter-spacing:.13em;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.sec-title.blue{color:var(--ac)}.sec-title.purple{color:var(--pu)}

/* btn */
.btn{font-family:var(--sans);font-size:12px;font-weight:700;border:none;border-radius:5px;padding:9px 18px;cursor:pointer;transition:all .14s;display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;height:36px}
.btn-pri{background:linear-gradient(135deg,#0ea5e9,#0066aa);color:#fff;box-shadow:0 3px 12px rgba(14,165,233,.2)}
.btn-pri:hover{box-shadow:0 5px 18px rgba(14,165,233,.35);transform:translateY(-1px)}
.btn-pur{background:linear-gradient(135deg,var(--pu),#6d28d9);color:#fff}
.btn-pur:hover{opacity:.85}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.btn-full{width:100%}
.sp{width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
.btn.loading .sp{display:block}.btn.loading .bt{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* 프리셋 */
.preset-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.pc-btn{font-family:var(--mono);font-size:10px;padding:5px 13px;border-radius:20px;cursor:pointer;border:1px solid var(--b2);background:transparent;color:var(--t3);transition:all .14s}
.pc-btn:hover{border-color:var(--ac);color:var(--ac)}
.pc-btn.active{border-color:var(--gr);background:rgba(52,211,153,.1);color:var(--gr)}
.pc-btn.warn.active{border-color:var(--or);background:rgba(251,146,60,.1);color:var(--or)}

/* 파라미터 그리드 */
.param-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:7px;margin-bottom:14px}
.pi{background:#0e1117;border:1px solid var(--b1);border-radius:5px;padding:9px 11px}
.pi.changed{border-color:rgba(251,210,90,.4)}
.pi-lbl{font-size:9px;font-family:var(--mono);color:var(--ac);letter-spacing:.06em}
.pi-desc{font-size:9px;color:var(--t3);margin-top:2px}
.pi-row{display:flex;align-items:center;gap:6px;margin-top:6px}
.pi-inp{background:transparent;border:none;border-bottom:1px solid var(--b2);color:var(--t1);font-family:var(--mono);font-size:12px;padding:2px 4px;outline:none;width:72px;text-align:right;transition:border-color .2s}
.pi-inp:focus{border-color:var(--ac)}
.pi-base{font-size:10px;font-family:var(--mono);color:var(--t3);margin-left:4px}
.pi-diff{font-size:10px;font-family:var(--mono);margin-left:2px}

/* today */
.today-card{background:var(--card);border:1px solid var(--b2);border-radius:12px;padding:20px 22px;margin-bottom:16px;position:relative;overflow:hidden}
.today-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--ac),var(--pu),transparent)}
.tc-title{font-family:var(--mono);font-size:10px;letter-spacing:.13em;color:var(--ac);margin-bottom:14px}
.price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.pm{font-size:clamp(24px,5vw,40px);font-family:var(--mono);font-weight:600;color:#fff}
.pch{font-size:14px;font-family:var(--mono);font-weight:500}
.up{color:var(--gr)}.dn{color:var(--rd)}.flat{color:var(--t3)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:8px;margin-bottom:16px}
.stat{background:#0e1117;border:1px solid var(--b1);border-radius:6px;padding:10px 12px}
.sl{font-size:10px;font-family:var(--mono);color:var(--t3);letter-spacing:.07em;margin-bottom:3px}
.sv{font-size:15px;font-family:var(--mono);font-weight:600}
.ca{color:var(--ac)}.cg{color:var(--gr)}.cr{color:var(--rd)}.cy{color:var(--yw)}.cw{color:#fff}
.orders-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.op{background:#0e1117;border-radius:7px;overflow:hidden}
.oh{padding:9px 13px;font-family:var(--mono);font-size:10px;letter-spacing:.09em;font-weight:600}
.oh.buy{background:rgba(52,211,153,.08);color:var(--gr);border-bottom:1px solid rgba(52,211,153,.15)}
.oh.sell{background:rgba(248,113,113,.08);color:var(--rd);border-bottom:1px solid rgba(248,113,113,.15)}
.oi{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-bottom:1px solid var(--b1)}
.oi:last-child{border-bottom:none}
.ol{font-size:10px;font-family:var(--mono);color:var(--t3)}
.op2{font-size:14px;font-family:var(--mono);font-weight:600}
.op2.buy{color:var(--gr)}.op2.sell{color:var(--rd)}
.oq{font-size:11px;font-family:var(--mono);color:var(--t3);background:var(--b1);padding:2px 6px;border-radius:3px}
.no-order{padding:13px;font-family:var(--mono);font-size:11px;color:var(--t3);text-align:center}

/* sub-tabs */
.stabs{display:flex;border-bottom:1px solid var(--b1)}
.stab{font-size:11px;font-family:var(--mono);letter-spacing:.06em;padding:9px 14px;cursor:pointer;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .13s;white-space:nowrap}
.stab.active{color:var(--ac);border-color:var(--ac)}
.stab:hover:not(.active){color:var(--t2)}
.stp{display:none;padding:18px 0}.stp.active{display:block}

/* chart & table */
.cw2{background:var(--card);border:1px solid var(--b1);border-radius:7px;padding:14px 16px;margin-bottom:12px}
.ct{font-size:11px;font-family:var(--mono);color:var(--t2);margin-bottom:9px}
.leg{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:7px}
.li{display:flex;align-items:center;gap:4px;font-size:11px;font-family:var(--mono);color:var(--t3)}
.ld{width:7px;height:7px;border-radius:50%}
.hmg{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:3px}
.hmc{border-radius:4px;padding:8px 5px;text-align:center;font-family:var(--mono);font-size:11px;font-weight:500}
.hml{font-size:9px;margin-bottom:3px;opacity:.6}
.tw{background:var(--card);border:1px solid var(--b1);border-radius:7px;overflow:hidden;margin-bottom:12px}
.th2{padding:9px 14px;border-bottom:1px solid var(--b2);font-size:11px;font-family:var(--mono);color:var(--t2);display:flex;align-items:center;justify-content:space-between}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
th{padding:6px 11px;text-align:left;color:var(--t3);font-weight:500;font-size:10px;letter-spacing:.06em;border-bottom:1px solid var(--b2)}
td{padding:7px 11px;border-bottom:1px solid var(--b1);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.pos{color:var(--gr)}.neg{color:var(--rd)}
.fb{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.fbn{font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:3px;cursor:pointer;border:1px solid var(--b2);background:#0e1117;color:var(--t3);transition:all .13s;height:28px;display:inline-flex;align-items:center}
.fbn.active{background:rgba(56,189,248,.1);border-color:var(--ac);color:var(--ac)}
.pb{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:3px;cursor:pointer;border:1px solid var(--b2);background:transparent;color:var(--t3);transition:all .13s}
.pb:hover{border-color:var(--ac);color:var(--ac)}
.pb.on{background:rgba(56,189,248,.1);border-color:var(--ac);color:var(--ac)}
.presets{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.di{font-size:10px;font-family:var(--mono);color:var(--t3);margin-top:5px}

/* misc */
.ph{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--t3);font-family:var(--mono);font-size:12px;text-align:center;gap:10px}
.ph .ico{font-size:38px;opacity:.3}
.lo{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px;gap:10px;color:var(--t3);font-family:var(--mono);font-size:12px}
.ls{width:28px;height:28px;border:3px solid var(--b2);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
.kpi{background:var(--card);border:1px solid var(--b1);border-radius:7px;padding:12px 13px;transition:all .17s}
.kpi:hover{border-color:var(--b2);transform:translateY(-2px)}
.kl{font-size:10px;font-family:var(--mono);color:var(--t3);letter-spacing:.07em;margin-bottom:4px}
.kv{font-size:17px;font-family:var(--mono);font-weight:600}
.ks{font-size:10px;color:var(--t3);margin-top:3px;font-family:var(--mono)}
.kg{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:9px;margin-bottom:14px}
.save-toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid rgba(52,211,153,.3);border-radius:8px;padding:10px 16px;font-family:var(--mono);font-size:12px;color:var(--gr);z-index:100;transform:translateY(80px);opacity:0;transition:all .3s ease;display:flex;align-items:center;gap:7px}
.save-toast.show{transform:translateY(0);opacity:1}
.sec-note{font-size:10px;font-family:var(--mono);color:var(--t3);margin-top:12px;padding-top:12px;border-top:1px solid var(--b1);line-height:1.7}
@media(max-width:600px){.orders-grid{grid-template-columns:1fr}.stat-grid{grid-template-columns:repeat(2,1fr)}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
</style>
</head>
<body>
<div class="page">

<header>
  <div>
    <div class="chip">SOXL · Kouya Method</div>
    <h1>SOXL <span>Daily Signal</span></h1>
  </div>
  <div class="live-badge"><div class="dot" id="liveDot"></div><span id="updatedAt">로드 중...</span></div>
</header>

<nav class="main-tabs">
  <div class="mtab active" onclick="mt('signal',this)">📊 시그널</div>
  <div class="mtab" onclick="mt('backtest',this)">📈 백테스트</div>
  <div class="mtab" onclick="mt('trades',this)">📋 거래 내역</div>
  <div class="mtab" onclick="mt('settings',this)">⚙ 설정</div>
</nav>

<!-- 시그널 -->
<div class="mpane active" id="pane-signal">
  <div class="today-card" id="todayCard">
    <div class="lo"><div class="ls"></div><span>데이터 로드 중...</span></div>
  </div>
  <div class="cw2">
    <div class="ct">SOXL 가격 추이 (최근 180일)</div>
    <div style="position:relative;height:240px"><canvas id="cvPrice"></canvas></div>
  </div>
</div>

<!-- 백테스트 -->
<div class="mpane" id="pane-backtest">
  <div class="sec blue">
    <div class="sec-title blue">백테스트 설정
      <span id="btParamTag" style="font-size:9px;color:var(--t3);font-family:var(--mono)"></span>
    </div>
    <div class="grid-end">
      <div class="field" style="grid-column:span 2">
        <label>기간</label>
        <div class="drow">
          <div class="field"><input type="date" id="sd"></div>
          <span>~</span>
          <div class="field"><input type="date" id="ed"></div>
        </div>
        <div class="presets">
          <button class="pb" onclick="sp('1M',this)">1개월</button>
          <button class="pb" onclick="sp('3M',this)">3개월</button>
          <button class="pb" onclick="sp('6M',this)">6개월</button>
          <button class="pb" onclick="sp('1Y',this)">1년</button>
          <button class="pb on" onclick="sp('ALL',this)">전체</button>
          <button class="pb" onclick="sp('2022',this)">2022 폭락</button>
          <button class="pb" onclick="sp('2023',this)">2023 반등</button>
        </div>
        <div class="di" id="di"></div>
      </div>
      <div class="field">
        <label>초기 자본 ($)</label>
        <input type="number" id="btCap" value="10000" min="100" step="100">
      </div>
      <div class="field">
        <label>수수료 (%, 편도)</label>
        <input type="number" id="btComm" value="0.05" min="0" max="1" step="0.01">
      </div>
      <div class="field">
        <label>체결 방식</label>
        <select id="btFillMode">
          <option value="close">종가 (LOC)</option>
          <option value="open">시가 (MOO)</option>
          <option value="limit">지정가 (Limit)</option>
        </select>
      </div>
      <div style="display:flex;align-items:flex-end;padding-bottom:0">
        <button class="btn btn-pri btn-full" id="rb" onclick="runBT()">
          <div class="sp"></div><span class="bt">▶ 실행</span>
        </button>
      </div>
    </div>
  </div>
  <div class="stabs">
    <div class="stab active" onclick="sst('btRes',this)">결과</div>
    <div class="stab" onclick="sst('btTr',this)">거래 내역</div>
  </div>
  <div class="stp active" id="stp-btRes">
    <div id="btResult"><div class="ph"><div class="ico">📊</div><div>기간을 선택하고 실행하세요</div></div></div>
  </div>
  <div class="stp" id="stp-btTr">
    <div id="btTrContent"><div class="ph"><div class="ico">📋</div><div>백테스트 실행 후 표시됩니다</div></div></div>
  </div>
</div>

<!-- 거래 내역 -->
<div class="mpane" id="pane-trades">
  <div id="trContent"><div class="ph"><div class="ico">📋</div><div>설정 저장 후 내역이 표시됩니다</div></div></div>
</div>

<!-- 설정 -->
<div class="mpane" id="pane-settings">
  <div class="sec blue">
    <div class="sec-title blue">💰 투자 설정
      <span style="font-size:9px;color:var(--t3);font-family:var(--mono)">브라우저에 영구 저장</span>
    </div>
    <div class="grid">
      <div class="field">
        <label>초기 자본 ($)</label>
        <input type="number" id="cfgCapital" value="10000" min="100" step="100">
      </div>
      <div class="field">
        <label>거래 수수료 (%, 편도)</label>
        <input type="number" id="cfgComm" value="0.05" min="0" max="1" step="0.01">
        <span class="hint">0.05 = 0.05%</span>
      </div>
      <div class="field">
        <label>체결 방식</label>
        <select id="cfgFillMode">
          <option value="close">종가 (LOC)</option>
          <option value="open">시가 (MOO)</option>
          <option value="limit">지정가 (Limit)</option>
        </select>
        <span class="hint">종가: 당일 종가 체결 / 시가: 익일 시가 체결 / 지정가: 지정가 그대로 체결</span>
      </div>
      <div class="field">
        <label>투자 시작일</label>
        <input type="date" id="cfgStart">
      </div>
      <div class="field">
        <label>시작일 보유 수량 (주)</label>
        <input type="number" id="cfgHoldings" value="0" min="0" step="1">
      </div>
      <div class="field">
        <label>시작일 평단가 ($)</label>
        <input type="number" id="cfgAvg" value="0" min="0" step="0.01">
      </div>
    </div>
  </div>

  <div class="sec purple">
    <div class="sec-title purple">🧠 알고리즘 파라미터</div>
    <div style="margin-bottom:14px">
      <div style="font-size:10px;font-family:var(--mono);color:var(--t3);letter-spacing:.07em;margin-bottom:8px">프리셋</div>
      <div class="preset-row">
        <button class="pc-btn active" id="pc-baseline"   onclick="applyPreset('baseline',this)">기존 (원본)</button>
        <button class="pc-btn"        id="pc-balanced"   onclick="applyPreset('balanced',this)">균형형</button>
        <button class="pc-btn warn"   id="pc-aggressive" onclick="applyPreset('aggressive',this)">공격형</button>

}
function loadCfg(){
  try{return JSON.parse(localStorage.getItem(SKEY)||'null')||defSettings();}catch{return defSettings();}
}
function saveCfgData(s){localStorage.setItem(SKEY,JSON.stringify(s));}

function getCurCfg(){
  return{
    capital:  parseFloat(document.getElementById('cfgCapital').value)||10000,
    comm:     parseFloat(document.getElementById('cfgComm').value)||0,
    start:    document.getElementById('cfgStart').value||FIRST,
    holdings: parseInt(document.getElementById('cfgHoldings').value)||0,

}
function applyCfgToUI(s){

  applyParamsToUI(s.params||PRESETS.baseline);

/* ══════ 파라미터 UI ══════ */
function initParamUI(){
  const groups={A:[],B:[],C:[],D:[],EF:[]};
  for(const[k,m]of Object.entries(PMETA)) groups[m.g].push({k,...m});
  const bv=PRESETS.baseline;
  const renderGroup=(items,id)=>{
    const wrap=document.getElementById(id);
    if(!wrap)return;
    const lbl=wrap.getAttribute('data-label')||'';
    wrap.innerHTML=`<div style="font-size:10px;font-family:var(--mono);color:var(--pu);letter-spacing:.08em;margin-bottom:6px">${lbl}</div>
      <div class="param-grid">${items.map(({k,l,d,s,mn,mx})=>`
        <div class="pi" id="pi-${k}">
          <div class="pi-lbl">${l}</div><div class="pi-desc">${d}</div>
          <div class="pi-row">
            <input class="pi-inp" type="number" id="p-${k}" value="${bv[k]}"

            <span class="pi-base">/${bv[k]}</span>
            <span class="pi-diff" id="pd-${k}"></span>
          </div>
        </div>`).join('')}
      </div>`;
  };
  renderGroup(groups.A,'pgA');
  renderGroup(groups.B,'pgB');
  renderGroup(groups.C,'pgC');
  renderGroup(groups.D,'pgD');
  renderGroup(groups.EF,'pgEF');
}
function onPI(k,v){
  const bv=PRESETS.baseline[k], val=parseFloat(v);
  const diffEl=document.getElementById('pd-'+k);
  const piEl=document.getElementById('pi-'+k);
  if(!isNaN(val)&&Math.abs(val-bv)>1e-6){
    const d=val-bv;
    diffEl.textContent=(d>=0?'+':'')+d.toFixed(4);
    diffEl.style.color=d>0?'var(--yw)':'var(--or)';
    piEl.classList.add('changed');
  }else{diffEl.textContent='';piEl.classList.remove('changed');}
  if(_currentPreset!=='custom'){_currentPreset='custom';refreshPresetUI();}
}
function getCurParams(){
  const p={};
  for(const k of Object.keys(PMETA)){
    const el=document.getElementById('p-'+k);
    if(el) p[k]=parseFloat(el.value)||PRESETS.baseline[k];
  }
  return p;
}
function applyParamsToUI(params){
  for(const[k,v]of Object.entries(params)){
    const el=document.getElementById('p-'+k);
    if(!el)continue;
    el.value=v;
    const bv=PRESETS.baseline[k],d=v-bv;
    const diffEl=document.getElementById('pd-'+k);
    const piEl=document.getElementById('pi-'+k);
    if(diffEl&&piEl){
      if(Math.abs(d)>1e-6){
        diffEl.textContent=(d>=0?'+':'')+d.toFixed(4);
        diffEl.style.color=d>0?'var(--yw)':'var(--or)';
        piEl.classList.add('changed');
      }else{diffEl.textContent='';piEl.classList.remove('changed');}
    }
  }
}
function applyPreset(name,el){
  _currentPreset=name;
  if(name!=='custom') applyParamsToUI(PRESETS[name]);
  refreshPresetUI();
}
function refreshPresetUI(){
  ['baseline','balanced','aggressive','close_opt','open_opt','limit_opt','custom'].forEach(n=>{
    const el=document.getElementById('pc-'+n);
    if(el) el.classList.toggle('active',n===_currentPreset);
  });
  const cc=document.getElementById('pc-custom');
  if(cc) cc.style.display=_currentPreset==='custom'?'inline-flex':'none';
  const d=document.getElementById('presetDesc');
  if(d) d.textContent=PRESET_DESC[_currentPreset]||'';
  // 백테스트 태그
  const tag=document.getElementById('btParamTag');
  if(tag) tag.textContent=`파라미터: ${_currentPreset}`;
}
function toggleAdv(){
  const w=document.getElementById('advWrap'),b=document.getElementById('advBtn');
  const o=w.style.display==='none';
  w.style.display=o?'block':'none';
  b.textContent=o?'▼ 고급 파라미터 접기':'▶ 고급 파라미터 펼치기';
}

/* ══════ 저장/초기화 ══════ */
function saveCfg(){
  const s=getCurCfg();
  saveCfgData(s);
  showToast('✓ 설정 저장됨');
  runSim(s);
  document.getElementById('btComm').value=s.comm;
  document.getElementById('btCap').value=s.capital;
}
function resetCfg(){
  if(!confirm('모든 설정을 초기값으로 되돌릴까요?'))return;
  const d=defSettings();d.start=FIRST;
  applyCfgToUI(d);saveCfgData(d);
  showToast('✓ 초기화됨');runSim(d);
}
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg||'✓ 저장됨';el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

    if(pct>-1)return Math.max((P.b_gt_n1||.995)-Math.min(hbq*((P.b_hbq_penalty)||.00332),(P.b_hbq_max||.025)),(P.b_gt_n1||.995)-(P.b_hbq_max||.025));
    if(pct>-3)return P.b_gt_n3||.989;if(pct>-6)return P.b_gt_n6||.9807;if(pct>-10)return P.b_gt_n10||.96;
    return P.b_else||.97;
  }
  function s1p(pct,c2,a2,hbq,cy){
    if(cy)return r2(c2*(P.s1_carry||1.006));if(pct>10)return r2(c2*(P.s1_gt10||1.0092));
    if(pct>5)return r2(c2*(P.s1_gt5||1.0088));if(pct>1)return r2(c2*(P.s1_gt1||1.007));
    if(a2>c2)return hbq>1.5?r2(a2*(P.s1_avg_hi||1.002)):r2(c2*(P.s1_avg_lo||1.005));
    const ap=r2(a2*(P.s1_avg_hi||1.002));
    if(ap<=c2&&hbq>1.5&&hbq<2.1&&pct<1)return ap;return r2(c2*(P.s1_default||1.007));
  }
  function s2p(pct,c2,a2,s1,cy,ps3){
    if(cy){if(pct<-2)return r2(s1*(P.s2_carry_deep||1.002));if(ps3>0&&ps3>a2*1.03)return ps3;return r2(a2*(P.s2_avg||1.002));}
    if(s1<c2)return r2(c2*(P.s2_gt3||1.006));if(pct>3)return r2(c2*(P.s2_gt3||1.006));
    if(pct<-1)return r2(c2*(P.s2_lt_n1||1.003));return r2(a2*(P.s2_default||1.002));
  }
  const bq=cq(cs,cl),buys=[],sells=[];
  if(h===0){const b1=r2(cl*(P.buy1_high_factor||1.158)),b2=r2(cl*b2f);buys.push([b1,cq(cs,b1),'BUY1'],[b2,cq(cs,b2),'BUY2']);return{buys,sells};}
  const pct=av>0?(cl/av-1)*100:0,hbq=bq>0?h/bq:0;
  const b2=r2(cl*b2f),b2q=cq(cs,b2),b1=r2(cl*b1f(pct,hbq)),b1q=cq(cs,b1);
  if(b1>=b2)buys.push([b1,b1q,'BUY1'],[b2,b2q,'BUY2']);else buys.push([b2,b2q,'BUY2'],[b1,b1q,'BUY1']);
  const ohbq=P.one_sell_hbq||1.5,opct=P.one_sell_pct||7,cpct=P.carry_pct||5,cmh=P.carry_min_hold||100;
  const cy=(p2p>0)&&(pct<cpct)&&(h>cmh),one=(hbq<ohbq)||(pct>opct);
  const sp1=s1p(pct,cl,av,hbq,cy),sq1=one?h:(h<=bq?h:cq(cs,sp1));
  sells.push([sp1,sq1,'SELL1']);
  if(!one){const sp2=s2p(pct,cl,av,sp1,cy,p3p),sq2=cq(cs,b2);sells.push([sp2,sq2,'SELL2']);
    if(cy){const s3=r2(p2p+.01),s3q=p2q||sq1;if(s3>=sp1)sells.push([s3,s3q,'SELL3']);}}
  sells.sort((a,b)=>a[0]-b[0]);sells.forEach((s,i)=>{s[2]='SELL'+(i+1);});
  return{buys,sells};
}

function simulate(series,capital,comm=0,initH=0,initAvg=0,P={},fillMode='close'){
  let cash=capital-initAvg*initH,h=initH,avg=initAvg,cs=capital,cycle=0;
  if(cash<0){cash=capital;h=initH;avg=initAvg;}
  let p2p=0,p2q=0,p3p=0,p3q=0;
  let pendingOrders=null;
  const trades=[],daily=[];
  
  for(let i=0;i<series.length;i++){
    const{date,open,close,high,low}=series[i];
    const hi=high||close, lo=low||close;

    if(pendingOrders){
      let np2=0,nq2=0,np3=0,nq3=0;

      // 1. 시가 체결 모드
      if(fillMode==='open'){
        const ep_base=open||close;
        for(let j=0;j<pendingOrders.sells.length;j++){
          const[sp,sq,sl]=pendingOrders.sells[j];
          if(h>0){
            const qty=Math.min(sq,h);
            const raw_price=ep_base, unit_rev=raw_price*(1-comm);
            const rev=r2(unit_rev*qty), pnl=(unit_rev-avg)*qty;
            h-=qty;cash+=rev;
            trades.push({date,type:'SELL',label:sl,price:raw_price,qty,revenue:rev,pnl:r2(pnl),avg_before:r2(avg),holdings_after:h});
            if(h===0){avg=0;cycle++;cs=cash;}
          }else{if(j===1){np2=sp;nq2=sq;}if(j===2){np3=sp;nq3=sq;}}
        }
        p2p=np2;p2q=nq2;p3p=np3;p3q=nq3;
        for(const[bp,bq2,bl]of pendingOrders.buys){
          if(cash>0){
            const raw_price=ep_base, unit_cost=raw_price*(1+comm);
            const qty=Math.min(bq2,Math.floor(cash/unit_cost));
            if(qty<=0)continue;
            const cost=r2(unit_cost*qty); avg=(avg*h+cost)/(h+qty); h+=qty; cash-=cost;
            trades.push({date,type:'BUY',label:bl,price:raw_price,qty,cost,avg_after:r2(avg),holdings_after:h});
          }
        }
      }
      // 2. 종가 체결 모드 (LOC)
      else if(fillMode==='close'){
        for(let j=0;j<pendingOrders.sells.length;j++){
          const[sp,sq,sl]=pendingOrders.sells[j];
          if(sp<=close&&h>0){ 
            const qty=Math.min(sq,h);
            const raw_price=close, unit_rev=raw_price*(1-comm);
            const rev=r2(unit_rev*qty), pnl=(unit_rev-avg)*qty;
            h-=qty;cash+=rev;
            trades.push({date,type:'SELL',label:sl,price:raw_price,qty,revenue:rev,pnl:r2(pnl),avg_before:r2(avg),holdings_after:h});
            if(h===0){avg=0;cycle++;cs=cash;}
          }else{if(j===1){np2=sp;nq2=sq;}if(j===2){np3=sp;nq3=sq;}}
        }
        p2p=np2;p2q=nq2;p3p=np3;p3q=nq3;
        for(const[bp,bq2,bl]of pendingOrders.buys){
          if(bp>=close&&cash>0){ 
            const raw_price=close, unit_cost=raw_price*(1+comm);
            const qty=Math.min(bq2,Math.floor(cash/unit_cost));
            if(qty<=0)continue;
            const cost=r2(unit_cost*qty); avg=(avg*h+cost)/(h+qty); h+=qty; cash-=cost;
            trades.push({date,type:'BUY',label:bl,price:raw_price,qty,cost,avg_after:r2(avg),holdings_after:h});
          }
        }
      }
      // 3. 지정가 체결 모드 (Limit)
      else if(fillMode==='limit'){
        for(let j=0;j<pendingOrders.sells.length;j++){
          const[sp,sq,sl]=pendingOrders.sells[j];
          if(hi>=sp&&h>0){ 
            const qty=Math.min(sq,h);
            const raw_price=sp, unit_rev=raw_price*(1-comm);
            const rev=r2(unit_rev*qty), pnl=(unit_rev-avg)*qty;
            h-=qty;cash+=rev;
            trades.push({date,type:'SELL',label:sl,price:raw_price,qty,revenue:rev,pnl:r2(pnl),avg_before:r2(avg),holdings_after:h});
            if(h===0){avg=0;cycle++;cs=cash;}
          }else{if(j===1){np2=sp;nq2=sq;}if(j===2){np3=sp;nq3=sq;}}
        }
        p2p=np2;p2q=nq2;p3p=np3;p3q=nq3;
        for(const[bp,bq2,bl]of pendingOrders.buys){
          if(lo<=bp&&cash>0){ 
            const raw_price=bp, unit_cost=raw_price*(1+comm);
            const qty=Math.min(bq2,Math.floor(cash/unit_cost));
            if(qty<=0)continue;
            const cost=r2(unit_cost*qty); avg=(avg*h+cost)/(h+qty); h+=qty; cash-=cost;
            trades.push({date,type:'BUY',label:bl,price:raw_price,qty,cost,avg_after:r2(avg),holdings_after:h});
          }
        }
      }
    }

    // 다음 날 사용될 주문 세팅 및 당일 기록
    const res=recP(cs,close,avg,h,p2p,p2q,p3p,p3q,P);
    pendingOrders=res;
    daily.push({date,price:close,holdings:h,avg_price:r2(avg),cash:r2(cash),equity:r2(cash+h*close),profit_pct:r2(avg>0&&h>0?(close/avg-1)*100:0),cycle});
  }
  
  const last=daily[daily.length-1];
  const lastOrd=last?recP(cs,last.price,last.avg_price,last.holdings,p2p,p2q,p3p,p3q,P):{buys:[],sells:[]};
  const EQ=daily.map(d=>d.equity),N=EQ.length,DT=daily.map(d=>d.date);
  const maxEQ=Math.max(...EQ),minEQ=Math.min(...EQ);
  const mdd=-r2((maxEQ-minEQ)/maxEQ*100),mPk=DT[EQ.indexOf(maxEQ)],mTr=DT[EQ.indexOf(minEQ)];
  let _pk=EQ[0];const DD=EQ.map((eq,i)=>{if(eq>_pk)_pk=eq;return r2((eq/_pk-1)*100);});
  const DR=EQ.slice(1).map((eq,i)=>r2((eq/EQ[i]-1)*100));
  const monthly={};daily.forEach(d=>{const ym=d.date.slice(0,7);if(!monthly[ym])monthly[ym]={sEq:d.equity,eEq:d.equity,sCl:d.price,eCl:d.price};monthly[ym].eEq=d.equity;monthly[ym].eCl=d.price;});
  const init=capital,fin=EQ[N-1];
  const sells=trades.filter(t=>t.type==='SELL'),pnls=sells.map(t=>t.pnl||0);
  const win=pnls.filter(p=>p>0).length,lose=pnls.filter(p=>p<=0).length;
  const avgR=DR.reduce((a,b)=>a+b,0)/Math.max(DR.length,1)/100;
  const stdR=Math.sqrt(DR.reduce((s,v)=>s+(v/100-avgR)**2,0)/Math.max(DR.length-1,1));
  const sharpe=stdR>0?r2(avgR/stdR*Math.sqrt(252)):0;
  
  return{m:{tr:r2((fin/init-1)*100),cagr:r2(((fin/init)**(252/Math.max(N,1))-1)*100),mdd,mPk,mTr,sharpe,fin:r2(fin),init,nD:N,cy:cycle,nB:trades.filter(t=>t.type==='BUY').length,nS:sells.length,win,lose,wr:r2(win/Math.max(pnls.length,1)*100)},EQ,DT,DD,DR,trades,daily,monthly,last,lastOrd,cs_final:cs};
}

const CI={};

async function init(){
  // ── prices.json 로드 (스마트 캐시: today.json 날짜 비교) ──────
  // today.json을 먼저 fetch해서 마지막 업데이트 날짜 확인
  let todayData = null;
  try{
    // today.json은 작은 파일이므로 항상 최신으로 fetch
    const res=await fetch('data/today.json?t='+Date.now());
    if(res.ok) todayData=await res.json();
  }catch{}

  // 헤더 업데이트
  if(todayData){
    const L=todayData.date||'';
    document.getElementById('liveDot').className='dot'+(isRecent(L)?'':' stale');
    document.getElementById('updatedAt').textContent=todayData.generated_at||L;
  }

  // prices.json: 캐시 키를 today.json의 date로 관리
  // → 날짜가 바뀐 날만 새로 fetch, 같은 날은 브라우저 캐시 사용
  const pricesCacheKey = todayData?.date || 'nodate';
  const CACHE_STORE = 'soxl-prices-v1';

  try{
    let raw = null;

    // Cache API 지원 여부 확인
    if('caches' in window){
      try{
        const cache = await caches.open(CACHE_STORE);
        const cachedRes = await cache.match('prices-' + pricesCacheKey);
        if(cachedRes){
          raw = await cachedRes.json();
          console.log('prices.json 캐시 히트 ('+pricesCacheKey+')');
        } else {
          // 캐시 미스: 새로 fetch
          document.getElementById('todayCard').innerHTML=
            '<div class="lo"><div class="sp" style="display:inline-block"></div> <span style="color:var(--t2)">데이터 로딩 중...</span></div>';
          const res=await fetch('data/prices.json');
          if(!res.ok)throw new Error('prices.json 로드 실패 ('+res.status+')');
          raw = await res.json();
          // 새 캐시 저장 (이전 캐시 삭제)
          const keys = await cache.keys();
          for(const k of keys) await cache.delete(k);
          await cache.put('prices-'+pricesCacheKey, new Response(JSON.stringify(raw)));
          console.log('prices.json 새로 fetch 및 캐시 저장');
        }
      } catch(cacheErr){
        // Cache API 실패 시 일반 fetch로 fallback
        console.warn('Cache API 오류, 일반 fetch:', cacheErr);
        const res=await fetch('data/prices.json');
        if(!res.ok)throw new Error('prices.json 로드 실패 ('+res.status+')');
        raw = await res.json();
      }
    } else {
      // Cache API 미지원: 일반 fetch
      const res=await fetch('data/prices.json');
      if(!res.ok)throw new Error('prices.json 로드 실패 ('+res.status+')');
      raw = await res.json();
    }

    // [date,o,h,l,c] 배열 또는 {date,open,...} 객체 모두 지원
    PRICES=raw.map(p=>Array.isArray(p)
      ?{date:p[0],open:p[1],high:p[2],low:p[3],close:p[4]}
      :{date:p.date,open:p.open||p.close,high:p.high||p.close,low:p.low||p.close,close:p.close});
    FIRST=PRICES[0].date;LAST=PRICES[PRICES.length-1].date;
  }catch(e){
    document.getElementById('todayCard').innerHTML=
      '<div class="lo" style="color:var(--rd)">⚠ '+e.message+'<br><small style=\'margin-top:6px\'>GitHub Pages 배포 후 data/prices.json이 있어야 합니다</small></div>';
    return;
  }

  // updatedAt fallback (today.json 없을 때)
  if(!todayData){
    document.getElementById('updatedAt').textContent=LAST;
    document.getElementById('liveDot').className='dot'+(isRecent(LAST)?'':' stale');
  }

  // 날짜 범위
  // 백테스트 날짜 범위는 PRICES 데이터 범위로 제한
  ['sd','ed'].forEach(id=>{const el=document.getElementById(id);if(el){el.min=FIRST;el.max=LAST;}});
  // 투자 시작일은 미래도 허용 (오늘 포함) - 없는 날짜면 runSim에서 fallback 처리
  const cfgEl=document.getElementById('cfgStart');
  if(cfgEl){cfgEl.min=FIRST;cfgEl.max='';}
  document.getElementById('sd').value=FIRST;
  document.getElementById('ed').value=LAST;

  // 파라미터 UI
  initParamUI();

  // 저장된 설정 로드
  const s=loadCfg();
  if(!s.start)s.start=FIRST;
  applyCfgToUI(s);
  updDI();

  // 차트
  renderPriceChart();

  // 시뮬
  runSim(s);
}

function isRecent(d){const diff=(new Date()-new Date(d))/86400000;return diff<=(new Date().getDay()===1?4:2);}

/* ══════ 시뮬 ══════ */
function runSim(s){
  let startDate=s.start||FIRST;

  // 시작일이 LAST보다 미래 → 아직 데이터 없음 = 처음 진입 케이스
  // 백테스트 없이 마지막 데이터로 오늘 신호만 제시
  if(startDate>LAST){
    const last=PRICES[PRICES.length-1];
    const prev=PRICES.length>=2?PRICES[PRICES.length-2]:last;
    const close=last.close;
    const P=s.params||PRESETS.baseline;
    const cs=s.capital||10000;
    // 보유 없음(처음 진입) 기준으로 주문 생성
    const ord=recP(cs,close,0,s.holdings||0,0,0,0,0,P);
    // SIM을 최소한의 구조로 만들어 renderSignal에 전달
    SIM={
      last:{date:last.date,price:close,holdings:s.holdings||0,avg_price:s.avg||0,
            cash:cs,equity:cs+(s.holdings||0)*close,profit_pct:0,cycle:0},
      lastOrd:ord,
      cs_final:cs,
      EQ:[cs],DT:[last.date],trades:[],daily:[],
      m:{tr:0,cagr:0,mdd:0,sharpe:0,fin:cs,init:cs,nD:0,cy:0,nB:0,nS:0,win:0,lose:0,wr:0}
    };
    renderSignal(SIM,[prev,last]);
    renderTrades(SIM);
    return;
  }

  // 시작일이 PRICES에 없으면 가장 가까운 이전 날짜로 fallback
  if(!PRICES.find(p=>p.date===startDate)){
    const before=PRICES.filter(p=>p.date<startDate);
    startDate=before.length?before[before.length-1].date:FIRST;
  }
  const series=PRICES.filter(p=>p.date>=startDate);
  if(!series.length){renderSignal(null);return;}
  SIM=simulate(series,s.capital||10000,(s.comm||0)/100,s.holdings||0,s.avg||0,s.params||PRESETS.baseline,s.fillMode||'close');
  renderSignal(SIM,series);
  renderTrades(SIM);
}

  const profCls=last.profit_pct>0?'cg':last.profit_pct<0?'cr':'cy';

    <div class="price-row"><div class="pm">$${close.toFixed(2)}</div><div class="pch ${chgCls}">${chg>=0?'+':''}${chg.toFixed(2)}%</div></div>
    <div class="stat-grid">
      <div class="stat"><div class="sl">사이클 원금</div><div class="sv cw">$${(sim.cs_final||0).toLocaleString()}</div></div>
      <div class="stat"><div class="sl">평단가</div><div class="sv">${last.avg_price>0?'$'+last.avg_price:'—'}</div></div>
      <div class="stat"><div class="sl">보유</div><div class="sv ca">${last.holdings}주</div></div>
      <div class="stat"><div class="sl">손익</div><div class="sv ${profCls}">${last.profit_pct?(last.profit_pct>=0?'+':'')+last.profit_pct.toFixed(2)+'%':'—'}</div></div>
      <div class="stat"><div class="sl">현금</div><div class="sv">$${last.cash.toLocaleString()}</div></div>
      <div class="stat"><div class="sl">총 자산</div><div class="sv cw">$${last.equity.toLocaleString()}</div></div>
    </div>
    <div class="orders-grid">
      <div class="op"><div class="oh buy">📈 매수 주문</div>${buyH}</div>
      <div class="op"><div class="oh sell">📉 매도 주문</div>${sellH}</div>
    </div>`;
}

/* ══════ 거래내역 ══════ */
function renderTrades(sim){
  let tr=[...sim.trades].reverse();
  if(_trFilter==='BUY')tr=tr.filter(t=>t.type==='BUY');
  else if(_trFilter==='SELL')tr=tr.filter(t=>t.type==='SELL');
  else if(_trFilter==='win')tr=tr.filter(t=>t.type==='SELL'&&(t.pnl||0)>0);
  else if(_trFilter==='lose')tr=tr.filter(t=>t.type==='SELL'&&(t.pnl||0)<=0);
  if(!tr.length){document.getElementById('trContent').innerHTML='<div class="ph"><div class="ico">📋</div><div>거래 없음</div></div>';return;}
  const rows=tr.map(t=>{const b=t.type==='BUY';
    const ph=t.pnl!=null?(t.pnl>=0?`<span class="pos">+$${t.pnl.toFixed(2)}</span>`:`<span class="neg">-$${Math.abs(t.pnl).toFixed(2)}</span>`):'—';
    return`<tr><td style="color:#fff">${t.date}</td><td><span style="color:${b?'var(--gr)':'var(--rd)'};font-weight:600">${t.type}</span></td><td style="color:var(--t3)">${t.label}</td><td style="color:${b?'var(--gr)':'var(--rd)'}">$${t.price.toFixed(2)}</td><td>${t.qty}주</td><td>$${(b?t.cost:t.revenue)?.toFixed(0)||'—'}</td><td>${ph}</td><td style="color:var(--t3)">$${(b?t.avg_after:t.avg_before||0).toFixed(3)}</td></tr>`;
  }).join('');
  const total=sim.trades.length;
  document.getElementById('trContent').innerHTML=`
    <div class="fb">
      <div class="fbn ${_trFilter==='all'?'active':''}" onclick="ftf('all',this)">전체(${total})</div>
      <div class="fbn ${_trFilter==='BUY'?'active':''}" onclick="ftf('BUY',this)">매수</div>
      <div class="fbn ${_trFilter==='SELL'?'active':''}" onclick="ftf('SELL',this)">매도</div>
      <div class="fbn ${_trFilter==='win'?'active':''}" onclick="ftf('win',this)">수익</div>
      <div class="fbn ${_trFilter==='lose'?'active':''}" onclick="ftf('lose',this)">손실</div>
    </div>
    <div class="tw"><div class="th2"><span>${tr.length}건</span><span style="color:var(--t3);font-size:10px">최신순</span></div>
      <div style="max-height:460px;overflow-y:auto">
        <table><thead><tr><th>날짜</th><th>구분</th><th>레이블</th><th>체결가</th><th>수량</th><th>금액</th><th>PnL</th><th>평단</th></tr></thead>
        <tbody>${rows}</tbody></table></div></div>`;
}
function ftf(f,el){_trFilter=f;document.querySelectorAll('.fbn').forEach(b=>b.classList.remove('active'));el.classList.add('active');if(SIM)renderTrades(SIM);}

/* ══════ 백테스트 ══════ */
function runBT(){
  const s_=document.getElementById('sd').value,e_=document.getElementById('ed').value;
  const cap=parseFloat(document.getElementById('btCap').value)||10000;
  const comm=(parseFloat(document.getElementById('btComm').value)||0)/100;
  const fillMode=document.getElementById('btFillMode').value||'close';
  if(!s_||!e_||s_>e_){alert('날짜를 확인하세요.');return;}
  const series=PRICES.filter(p=>p.date>=s_&&p.date<=e_);
  if(series.length<5){alert('데이터 부족');return;}
  const P=getCurParams();
  const btn=document.getElementById('rb');
  btn.classList.add('loading');btn.disabled=true;
  setTimeout(()=>{
    BT_SIM=simulate(series,cap,comm,0,0,P,fillMode);
    renderBTResult(BT_SIM);
    renderBTTrades(BT_SIM);
    btn.classList.remove('loading');btn.disabled=false;
  },30);
}

function renderBTResult(sim){
  const m=sim.m;
  const kpis=[
    {lb:'총 수익률',v:(m.tr>=0?'+':'')+m.tr.toFixed(2)+'%',c:m.tr>=0?'cg':'cr',s:`$${m.init.toLocaleString()}→$${m.fin.toLocaleString()}`},
    {lb:'CAGR',v:(m.cagr>=0?'+':'')+m.cagr.toFixed(2)+'%',c:m.cagr>=0?'cg':'cr',s:'연환산'},
    {lb:'MDD',v:m.mdd.toFixed(2)+'%',c:'cr',s:(m.mPk?.slice(5)||'')+'~'+(m.mTr?.slice(5)||'')},
    {lb:'샤프',v:m.sharpe.toFixed(3),c:m.sharpe>1?'cg':'cy',s:'연율화'},
    {lb:'거래일',v:m.nD+'일',c:'ca',s:sim.DT[0]+' ~ '+sim.DT[sim.DT.length-1]},
    {lb:'사이클',v:m.cy+'회',c:'ca',s:'완결'},
    {lb:'승률',v:m.wr+'%',c:m.wr>=50?'cg':'cr',s:`${m.win}승 ${m.lose}패`},
  ].map(k=>`<div class="kpi"><div class="kl">${k.lb}</div><div class="kv ${k.c}">${k.v}</div><div class="ks">${k.s}</div></div>`).join('');
  const entries=Object.entries(sim.monthly).sort((a,b)=>a[0]<b[0]?-1:1);
  const rets=entries.map(([,v])=>r2((v.eEq/v.sEq-1)*100));
  const maxA=Math.max(...rets.map(Math.abs),1);
  const hmH=entries.map(([ym,],i)=>{const ret=rets[i],it=Math.min(Math.abs(ret)/maxA,1);
    const bg=ret>=0?`rgba(52,211,153,${.1+it*.75})`:`rgba(248,113,113,${.1+it*.75})`;
    const tc=it>.55?'#fff':ret>=0?'#34d399':'#f87171';
    return`<div class="hmc" style="background:${bg};color:${tc}"><div class="hml">${ym}</div><div>${ret>=0?'+':''}${ret.toFixed(1)}%</div></div>`;
  }).join('');
  document.getElementById('btResult').innerHTML=`
    <div class="kg">${kpis}</div>
    <div class="cw2">
      <div class="leg"><div class="li"><div class="ld" style="background:#38bdf8"></div>에쿼티</div><div class="li"><div class="ld" style="background:#f87171"></div>MDD</div>
        <span style="margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--t3)">파라미터: ${_currentPreset}</span></div>
      <div style="position:relative;height:230px"><canvas id="cvBT"></canvas></div>
    </div>
    <div class="cw2"><div class="ct">월별 수익률</div><div class="hmg">${hmH}</div></div>`;
  const ctx=document.getElementById('cvBT').getContext('2d');
  if(CI.bt)CI.bt.destroy();
  const g=ctx.createLinearGradient(0,0,0,280);g.addColorStop(0,'rgba(56,189,248,.13)');g.addColorStop(1,'rgba(56,189,248,.01)');
  CI.bt=new Chart(ctx,{type:'line',data:{labels:sim.DT,datasets:[
    {label:'에쿼티($)',data:sim.EQ,yAxisID:'y',borderColor:'#38bdf8',borderWidth:2,fill:true,backgroundColor:g,tension:.35,pointRadius:0,order:1},
    {label:'MDD(%)',data:sim.DD,yAxisID:'y2',borderColor:'#f8717188',borderWidth:1.5,fill:false,tension:.25,pointRadius:0,order:2},
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:true,labels:{boxWidth:9,padding:12,color:'#94a3b8'}},tooltip:{backgroundColor:'#131820',borderColor:'#22304a',borderWidth:1,callbacks:{title:i=>i[0].label,label:i=>i.datasetIndex===0?` $${i.raw.toLocaleString()}`:` MDD: ${i.raw.toFixed(2)}%`}}},
    scales:{x:{grid:{color:'#1a2133'},ticks:{maxTicksLimit:12}},y:{position:'left',grid:{color:'#1a2133'},ticks:{callback:v=>'$'+v.toLocaleString()}},y2:{position:'right',grid:{drawOnChartArea:false},ticks:{callback:v=>v.toFixed(0)+'%'},reverse:true}}}});
}
function renderBTTrades(sim){
  const tr=[...sim.trades].reverse().slice(0,500);
  if(!tr.length){document.getElementById('btTrContent').innerHTML='<div class="ph"><div class="ico">📋</div><div>거래 없음</div></div>';return;}
  const rows=tr.map(t=>{const b=t.type==='BUY';
    const ph=t.pnl!=null?(t.pnl>=0?`<span class="pos">+$${t.pnl.toFixed(2)}</span>`:`<span class="neg">-$${Math.abs(t.pnl).toFixed(2)}</span>`):'—';
    return`<tr><td style="color:#fff">${t.date}</td><td><span style="color:${b?'var(--gr)':'var(--rd)'};font-weight:600">${t.type}</span></td><td style="color:var(--t3)">${t.label}</td><td style="color:${b?'var(--gr)':'var(--rd)'}">$${t.price.toFixed(2)}</td><td>${t.qty}주</td><td>$${(b?t.cost:t.revenue)?.toFixed(0)||'—'}</td><td>${ph}</td></tr>`;
  }).join('');
  document.getElementById('btTrContent').innerHTML=`
    <div class="tw"><div class="th2"><span>${sim.trades.length}건 (최신 500 표시)</span></div>
      <div style="max-height:460px;overflow-y:auto">
        <table><thead><tr><th>날짜</th><th>구분</th><th>레이블</th><th>체결가</th><th>수량</th><th>금액</th><th>PnL</th></tr></thead>
        <tbody>${rows}</tbody></table></div></div>`;
}

/* ══════ 가격 차트 ══════ */
function renderPriceChart(){
  const ctx=document.getElementById('cvPrice').getContext('2d');
  const recent=PRICES.slice(-180);
  const g=ctx.createLinearGradient(0,0,0,280);g.addColorStop(0,'rgba(56,189,248,.14)');g.addColorStop(1,'rgba(56,189,248,.01)');
  if(CI.price)CI.price.destroy();
  CI.price=new Chart(ctx,{type:'line',data:{labels:recent.map(p=>p.date),datasets:[{data:recent.map(p=>p.close),borderColor:'#38bdf8',borderWidth:2,fill:true,backgroundColor:g,tension:.35,pointRadius:0}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#131820',borderColor:'#22304a',borderWidth:1,callbacks:{title:i=>i[0].label,label:i=>` $${i.raw.toFixed(2)}`}}},
      scales:{x:{grid:{color:'#1a2133'},ticks:{maxTicksLimit:10}},y:{grid:{color:'#1a2133'},ticks:{callback:v=>'$'+v.toLocaleString()}}}}});
}

/* ══════ 유틸 ══════ */
function mt(n,el){document.querySelectorAll('.mpane').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));document.getElementById('pane-'+n).classList.add('active');el.classList.add('active');}
function sst(n,el){document.querySelectorAll('.stp').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));document.getElementById('stp-'+n).classList.add('active');el.classList.add('active');}
function sp(t,el){
  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));el.classList.add('on');
  if(!PRICES.length)return;
  const nAgo=n=>PRICES[Math.max(PRICES.length-n,0)].date,L=LAST,F=FIRST;let s,e;
  if(t==='1M'){s=nAgo(22);e=L;}else if(t==='3M'){s=nAgo(66);e=L;}else if(t==='6M'){s=nAgo(132);e=L;}
  else if(t==='1Y'){s=nAgo(252);e=L;}else if(t==='ALL'){s=F;e=L;}
  else if(t==='2022'){s='2022-01-03';e='2022-12-30';}else if(t==='2023'){s='2023-01-03';e='2023-12-29';}
  document.getElementById('sd').value=s;document.getElementById('ed').value=e;updDI();
}
function updDI(){
  const s=document.getElementById('sd').value,e=document.getElementById('ed').value;
  const cnt=PRICES.filter(p=>p.date>=s&&p.date<=e).length;
  document.getElementById('di').textContent=`→ ${cnt} 거래일`;
}
['sd','ed'].forEach(id=>document.getElementById(id)?.addEventListener('change',updDI));

init();
</script>
