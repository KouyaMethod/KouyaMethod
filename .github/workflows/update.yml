name: Daily SOXL Update

on:
  schedule:
    # 미국 장 마감(4pm ET = 21:00 UTC) 후 30분 → 21:30 UTC = 익일 06:30 KST
    # 평일(월~금)만 실행
    - cron: '30 21 * * 1-5'
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch SOXL data & generate recommendations
        run: python scripts/update_data.py

      - name: Commit & Push
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json data/today.json
          git diff --staged --quiet || git commit -m "📈 Daily update $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
          git push
