name: Daily SOXL Update

on:
  schedule:
    # 매일 UTC 22:00 = KST 07:00
    - cron: '0 22 * * *'
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch SOXL data & generate recommendations
        run: python scripts/update_data.py

      - name: Commit & Push
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json data/today.json
          git diff --staged --quiet || git commit -m "📈 Daily update $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
          git push
