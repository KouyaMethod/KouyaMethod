name: Daily SOXL Update

on:
  schedule:
    # 서머타임(EDT, 약 3월~11월): 4pm EDT = 20:00 UTC → +30분 = 20:30 UTC
    - cron: '30 20 * * 1-5'
    # 겨울시간(EST, 약 11월~3월): 4pm EST = 21:00 UTC → +30분 = 21:30 UTC
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch SOXL data & generate recommendations
        run: python scripts/update_data.py

      - name: Commit & Push updated data
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json data/today.json
          git diff --staged --quiet || git commit -m "📈 Daily update $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
          git push
